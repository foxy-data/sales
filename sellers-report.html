<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Sellers Report</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui;
background:#f5f7fb;
margin:20px;
}

h1{
margin-bottom:10px;
}

.panel{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #e6e6e6;
padding:6px;
text-align:right;
}

th{
background:#fafafa;
text-align:center;
}

td:first-child,
th:first-child{
text-align:left;
}

canvas{
background:white;
margin-top:20px;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Sellers dashboard</h1>

<div class="panel">

<select id="sellerFilter">
<option value="">Всі продавці</option>
</select>

<select id="yearFilter">
<option value="">Всі роки</option>
</select>

<select id="monthFilter">
<option value="">Всі місяці</option>
</select>

</div>

<canvas id="chart" height="120"></canvas>

<table id="table"></table>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTdFA0KeLd--Xe-bZL6XSZl5jGBu9qGi32Q-Vm8G1wFSjh4rL52f2L2poIUq-mgJ779NCjd-w7o9ago/pub?output=csv";

let rawData=[];
let metrics=[];

async function loadData(){

const res = await fetch(CSV_URL);
const csv = await res.text();

const parsed = Papa.parse(csv,{
skipEmptyLines:true
});

const rows = parsed.data;

const header = rows[0];

metrics = header.slice(3);

rawData = rows.slice(1).map(r=>{

return{
year:r[0],
month:r[1],
seller:r[2],
values:r.slice(3).map(v=>Number(v)||0)
};

});

initFilters();
render();

}

function initFilters(){

const sellers=[...new Set(rawData.map(d=>d.seller))];
const years=[...new Set(rawData.map(d=>d.year))];
const months=[...new Set(rawData.map(d=>d.month))];

const s=document.getElementById("sellerFilter");
const y=document.getElementById("yearFilter");
const m=document.getElementById("monthFilter");

sellers.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
s.appendChild(o);
});

years.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
y.appendChild(o);
});

months.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
m.appendChild(o);
});

[s,y,m].forEach(el=>el.addEventListener("change",render));

}

function getFiltered(){

const s=document.getElementById("sellerFilter").value;
const y=document.getElementById("yearFilter").value;
const m=document.getElementById("monthFilter").value;

return rawData.filter(d=>

(!s||d.seller===s)&&
(!y||d.year===y)&&
(!m||d.month===m)

);

}

function buildTable(data){

const table=document.getElementById("table");

let html="<tr>";

html+="<th>Seller</th>";

metrics.forEach(m=>{
html+="<th>"+m+"</th>";
});

html+="</tr>";

data.forEach(d=>{

html+="<tr>";

html+="<td>"+d.seller+"</td>";

d.values.forEach(v=>{
html+="<td>"+v+"</td>";
});

html+="</tr>";

});

table.innerHTML=html;

}

let chart;

function buildChart(data){

const sums=new Array(metrics.length).fill(0);

data.forEach(d=>{
d.values.forEach((v,i)=>sums[i]+=v);
});

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:metrics,
datasets:[{
label:"Total",
data:sums
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

}

function render(){

const data=getFiltered();

buildTable(data);
buildChart(data);

}

loadData();

</script>

</body>
</html>
