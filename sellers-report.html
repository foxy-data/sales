<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter,sans-serif;
background:#f5f6fa;
margin:12px;
color:#1d1d1f;
}

h2{
margin-bottom:8px;
}

.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px;
}

select{
padding:6px 10px;
border-radius:8px;
border:1px solid #ccc;
font-size:12px;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:14px;
}

.kpi{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.kpi-title{
font-size:11px;
color:#777;
}

.kpi-value{
font-size:20px;
font-weight:600;
}

.table-card{
background:white;
border-radius:14px;
overflow:auto;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}

table{
border-collapse:collapse;
min-width:1000px;
}

th,td{
padding:6px 8px;
font-size:11px;
border-bottom:1px solid #eee;
text-align:center;
white-space:nowrap;
}

th{
background:#fafafa;
position:sticky;
top:0;
font-weight:600;
}

.col-fix{
position:sticky;
left:0;
background:white;
font-weight:600;
text-align:left;
}

.rank-card{
background:white;
padding:8px 12px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
margin-bottom:6px;
display:flex;
justify-content:space-between;
}

.section{
margin-top:18px;
}

canvas{
max-height:300px;
}

.pivot-table{
margin-top:10px;
}

</style>
</head>

<body>

<h2>Звіт по продавцях</h2>

<div class="filters">

<select id="sellerFilter">
<option value="">Всі продавці</option>
</select>

<select id="metricSelect"></select>

</div>

<div class="kpi-grid">

<div class="kpi">
<div class="kpi-title">Сума</div>
<div class="kpi-value" id="kpiTotal"></div>
</div>

<div class="kpi">
<div class="kpi-title">Середнє</div>
<div class="kpi-value" id="kpiAvg"></div>
</div>

<div class="kpi">
<div class="kpi-title">Записи</div>
<div class="kpi-value" id="kpiRows"></div>
</div>

<div class="kpi">
<div class="kpi-title">Продавці</div>
<div class="kpi-value" id="kpiSellers"></div>
</div>

</div>

<div class="table-card" id="tableSection"></div>

<div class="section">

<h3>Pivot (по продавцю)</h3>

<div class="table-card pivot-table" id="pivotSection"></div>

</div>

<div class="section">

<h3>Рейтинг</h3>

<div id="rankingGrid"></div>

</div>

<div class="section">

<h3>Динаміка</h3>

<canvas id="dynChart"></canvas>

</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTdFA0KeLd--Xe-bZL6XSZl5jGBu9qGi32Q-Vm8G1wFSjh4rL52f2L2poIUq-mgJ779NCjd-w7o9ago/pub?output=csv"

let rawData=[]
let filtered=[]
let columns=[]
let chart

function num(v){
if(!v) return 0
return parseFloat(
v.toString()
.replace(/\s/g,'')
.replace(',','.')
) || 0
}

async function loadData(){

const res=await fetch(CSV_URL)
const csv=await res.text()

const rows=csv.split("\n").map(r=>r.split(","))

columns=rows[0]

rawData=[]

for(let i=1;i<rows.length;i++){

let obj={}

columns.forEach((c,j)=>{
obj[c]=rows[i][j]
})

rawData.push(obj)

}

filtered=[...rawData]

buildFilters()
renderAll()

}

function buildFilters(){

const sellers=new Set()

rawData.forEach(r=>{
if(r["Продавець"]) sellers.add(r["Продавець"])
})

const sellerSelect=document.getElementById("sellerFilter")

sellerSelect.innerHTML='<option value="">Всі продавці</option>'

sellers.forEach(s=>{
sellerSelect.innerHTML+=`<option value="${s}">${s}</option>`
})

const metricSelect=document.getElementById("metricSelect")

metricSelect.innerHTML=""

columns.forEach(c=>{
if(c!=="Продавець" && c!=="Місяць")
metricSelect.innerHTML+=`<option value="${c}">${c}</option>`
})

}

function applyFilters(){

const seller=document.getElementById("sellerFilter").value

filtered=rawData.filter(r=>{

if(!seller) return true

return r["Продавець"]===seller

})

renderAll()

}

function renderAll(){

renderKPI()
renderTable()
renderPivot()
renderRanking()
renderChart()

}

function renderKPI(){

const metric=document.getElementById("metricSelect").value

let total=0

filtered.forEach(r=>{
total+=num(r[metric])
})

const avg=total/filtered.length

const sellers=new Set(filtered.map(r=>r["Продавець"]))

document.getElementById("kpiTotal").innerText=Math.round(total)
document.getElementById("kpiAvg").innerText=Math.round(avg)
document.getElementById("kpiRows").innerText=filtered.length
document.getElementById("kpiSellers").innerText=sellers.size

}

function renderTable(){

const container=document.getElementById("tableSection")

let html="<table><thead><tr>"

columns.forEach((c,i)=>{

if(i==0)
html+=`<th class="col-fix">${c}</th>`
else
html+=`<th>${c}</th>`

})

html+="</tr></thead><tbody>"

filtered.forEach(r=>{

html+="<tr>"

columns.forEach((c,i)=>{

if(i==0)
html+=`<td class="col-fix">${r[c]||""}</td>`
else
html+=`<td>${r[c]||""}</td>`

})

html+="</tr>"

})

html+="</tbody></table>"

container.innerHTML=html

}

function renderPivot(){

const metric=document.getElementById("metricSelect").value

let map={}

filtered.forEach(r=>{

let seller=r["Продавець"]
let val=num(r[metric])

if(!map[seller]) map[seller]=0

map[seller]+=val

})

let html="<table><thead><tr><th>Продавець</th><th>"+metric+"</th></tr></thead><tbody>"

Object.entries(map).forEach(r=>{

html+=`<tr>
<td>${r[0]}</td>
<td>${Math.round(r[1])}</td>
</tr>`

})

html+="</tbody></table>"

document.getElementById("pivotSection").innerHTML=html

}

function renderRanking(){

const metric=document.getElementById("metricSelect").value

let map={}

filtered.forEach(r=>{

let seller=r["Продавець"]
let val=num(r[metric])

if(!map[seller]) map[seller]=0

map[seller]+=val

})

const arr=Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

let html=""

arr.forEach((r,i)=>{

html+=`
<div class="rank-card">
<div>${i+1}. ${r[0]}</div>
<div>${Math.round(r[1])}</div>
</div>
`

})

document.getElementById("rankingGrid").innerHTML=html

}

function renderChart(){

const metric=document.getElementById("metricSelect").value

let map={}

filtered.forEach(r=>{

let m=r["Місяць"]
let val=num(r[metric])

if(!map[m]) map[m]=0

map[m]+=val

})

if(chart) chart.destroy()

chart=new Chart(document.getElementById("dynChart"),{

type:"line",

data:{
labels:Object.keys(map),
datasets:[{
label:metric,
data:Object.values(map),
tension:0.3
}]
}

})

}

document.getElementById("sellerFilter").addEventListener("change",applyFilters)
document.getElementById("metricSelect").addEventListener("change",renderAll)

loadData()

setInterval(loadData,300000)

</script>

</body>
</html>
