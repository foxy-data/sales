
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sellers BI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter, sans-serif;
margin:0;
background:#0f1115;
color:#fff;
}

header{
padding:20px 30px;
font-size:22px;
font-weight:600;
background:#151922;
border-bottom:1px solid #222;
}

.container{
padding:25px;
}

.controls{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:8px 10px;
border-radius:8px;
border:1px solid #333;
background:#1a1f2b;
color:#fff;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#151922;
padding:18px;
border-radius:12px;
border:1px solid #262c3a;
}

.card-title{
font-size:13px;
opacity:.7;
margin-bottom:6px;
}

.card-value{
font-size:22px;
font-weight:600;
}

.chart-box{
background:#151922;
border-radius:12px;
padding:20px;
border:1px solid #262c3a;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
background:#151922;
border-radius:10px;
overflow:hidden;
}

thead{
background:#1d2230;
}

th,td{
padding:10px;
border-bottom:1px solid #232838;
text-align:center;
font-size:14px;
}

th{
position:sticky;
top:0;
}

tr:hover{
background:#1b2030;
}

.rank{
font-weight:600;
}

</style>
</head>

<body>

<header>📊 Sellers BI Dashboard</header>

<div class="container">

<div class="controls">

<label>
Метрика рейтингу
<select id="metricSelect"></select>
</label>

</div>

<div class="cards">

<div class="card">
<div class="card-title">Кількість продавців</div>
<div class="card-value" id="sellerCount">0</div>
</div>

<div class="card">
<div class="card-title">Середнє значення метрики</div>
<div class="card-value" id="avgMetric">0</div>
</div>

<div class="card">
<div class="card-title">Топ продавець</div>
<div class="card-value" id="topSeller">-</div>
</div>

</div>

<div class="chart-box">
<canvas id="ratingChart"></canvas>
</div>

<table id="reportTable">
<thead></thead>
<tbody></tbody>
</table>

</div>

<script>

const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxPqHp5lwwhjdDTaJdiwWYbhqZmeALG5dVhSZ6rHx2W8KGrcNWaa5-7qiVB87KKbQEXjtF1WVwmBzp/pub?output=csv"

let headers=[]
let data=[]
let chart

async function loadData(){

const res = await fetch(DATA_URL)
const text = await res.text()

const rows=text.trim().split("\n").map(r=>r.split(","))

headers=rows[0]
data=rows.slice(1)

buildTable()
buildMetricFilter()

document.getElementById("sellerCount").textContent=data.length

}

function buildTable(){

const thead=document.querySelector("#reportTable thead")
const tbody=document.querySelector("#reportTable tbody")

thead.innerHTML=""
tbody.innerHTML=""

let head="<tr>"

headers.forEach(h=>{
head+=`<th>${h}</th>`
})

head+="</tr>"

thead.innerHTML=head

data.forEach((row,i)=>{

let tr="<tr>"

row.forEach(cell=>{
tr+=`<td>${cell}</td>`
})

tr+="</tr>"

tbody.innerHTML+=tr

})

}

function buildMetricFilter(){

const select=document.getElementById("metricSelect")

headers.forEach((h,i)=>{

if(i===0) return

const opt=document.createElement("option")
opt.value=i
opt.textContent=h

select.appendChild(opt)

})

select.addEventListener("change",updateMetric)

updateMetric()

}

function updateMetric(){

const index=document.getElementById("metricSelect").value

data.sort((a,b)=>{

let A=parseFloat(a[index].replace("%",""))||0
let B=parseFloat(b[index].replace("%",""))||0

return B-A

})

buildTable()

updateCards(index)
drawChart(index)

}

function updateCards(index){

let sum=0

data.forEach(r=>{
sum+=parseFloat(r[index])||0
})

const avg=(sum/data.length).toFixed(2)

document.getElementById("avgMetric").textContent=avg
document.getElementById("topSeller").textContent=data[0][0]

}

function drawChart(index){

const labels=data.map(r=>r[0])
const values=data.map(r=>parseFloat(r[index])||0)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("ratingChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:headers[index],
data:values
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
y:{beginAtZero:true}
}
}
})

}

loadData()

</script>

</body>
</html>
