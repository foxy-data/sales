<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Динаміка показників</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{font-family:Arial;padding:10px;background:#f5f5f7}
.pill{padding:5px 10px;border-radius:8px;border:none;margin:2px;cursor:pointer}
.pill.active{background:#000;color:#fff}
.p1-active{background:#0071e3!important;color:#fff}
.p2-active{background:#34c759!important;color:#fff}
</style>
</head>

<body>

<h2>Динаміка</h2>

<button onclick="toggleCompareMode()">⚖️ Порівняння</button>

<div>
    <h4>Період 1</h4>
    <div id="yearPills"></div>
</div>

<div id="period2Wrap" style="display:none">
    <h4>Період 2</h4>
    <div id="yearPills2"></div>
</div>

<script>

const MONTHS=["Січ","Лют","Бер","Кві","Тра","Чер","Лип","Сер","Вер","Жов","Лис","Гру"]

let compareMode=false
let allYears=[2023,2024]
let allMonths=[1,2,3,4]

let periods1=new Set()
let periods2=new Set()

// mock data init
allYears.forEach(y=>{
    allMonths.forEach(m=>{
        periods1.add(y+"_"+m)
    })
})

function toggleCompareMode(){
    compareMode=!compareMode
    document.getElementById("period2Wrap").style.display=compareMode?"block":"none"

    if(compareMode && periods2.size===0){
        allYears.forEach(y=>{
            allMonths.forEach(m=>{
                periods2.add(y+"_"+m)
            })
        })
    }

    renderFilters()
}

// 🔥 ГОЛОВНИЙ ФІКС
function renderFilters(){
    if(compareMode){
        renderPillsFor('yearPills',periods1,'p1-active')
        renderPillsFor('yearPills2',periods2,'p2-active')
        return
    }

    renderPillsFor('yearPills',periods1,'active')
}

function renderPillsFor(containerId,set,activeClass){
    const el=document.getElementById(containerId)
    el.innerHTML=''

    allYears.forEach(y=>{
        const yBtn=document.createElement('button')
        yBtn.textContent=y
        yBtn.className='pill'

        const yearKeys=allMonths.map(m=>y+"_"+m)
        const allActive=yearKeys.every(k=>set.has(k))

        if(allActive) yBtn.classList.add(activeClass)

        yBtn.onclick=()=>{
            if(allActive){
                yearKeys.forEach(k=>set.delete(k))
            }else{
                yearKeys.forEach(k=>set.add(k))
            }
            renderFilters()
        }

        el.appendChild(yBtn)

        allMonths.forEach(m=>{
            const key=y+"_"+m
            const btn=document.createElement('button')
            btn.textContent=MONTHS[m-1]
            btn.className='pill'

            if(set.has(key)) btn.classList.add(activeClass)

            btn.onclick=()=>{
                if(set.has(key)) set.delete(key)
                else set.add(key)
                renderFilters()
            }

            el.appendChild(btn)
        })
    })
}

renderFilters()

</script>

</body>
</html>
