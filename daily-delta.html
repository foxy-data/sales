<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Дельта щоденна</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#f5f5f7;--text:#1d1d1f;--text-sec:#6e6e73;--accent:#0071e3;--border:#d2d2d7;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,0.06);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:8px 10px 60px}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skel{background:linear-gradient(90deg,#eaeaed 25%,#f5f5f7 50%,#eaeaed 75%);background-size:600px 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:7px}
.skel-row{display:flex;gap:8px;padding:9px 10px;border-bottom:1px solid #f2f2f4}
.skel-cell{height:11px;border-radius:5px;flex:1}.skel-cell.w{flex:2}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.back-link{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px}
.page-title{font-size:20px;font-weight:700}
.tabs{display:flex;gap:2px;background:#e5e5ea;border-radius:12px;padding:3px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{border:none;background:transparent;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-sec);font-family:inherit;transition:all .2s;white-space:nowrap}
.tab.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.filters-wrap{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.06)}
.filter-row{display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px;padding:7px 12px;border-bottom:1px solid #f0f0f2}
.filter-row:last-child{border-bottom:none}
.filter-label{font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.06em;padding-top:4px;margin-right:6px;white-space:nowrap}
.pill{border:none;background:transparent;padding:3px 7px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#6e6e73;transition:all .15s;white-space:nowrap}
.pill:hover{background:#f2f2f7;color:#1d1d1f}
.pill.active{background:#1d1d1f;color:#fff}
.pill-all{border:1px solid #d2d2d7;color:#555}
.pill-all.active{background:#374151;border-color:#374151;color:#fff}
.table-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-height:70vh;overflow-y:auto}
.table-hint{font-size:11px;color:var(--text-sec);padding:7px 12px;border-bottom:1px solid #f2f2f4;background:#fafafa}
table{border-collapse:collapse;min-width:100%}
th,td{padding:4px 7px;border-bottom:1px solid #f2f2f4;font-size:11px;text-align:right;white-space:nowrap}
thead{position:sticky;top:0;z-index:30}
th.grp{text-align:center;font-size:9px;font-weight:800;letter-spacing:.05em;color:#fff;border-bottom:1px solid rgba(255,255,255,0.15);height:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
th.sub{font-size:9px;font-weight:700;color:rgba(255,255,255,0.9);text-transform:uppercase;height:20px;border-bottom:2px solid rgba(0,0,0,0.2)}
th.c-l1,td.c-l1{position:sticky;left:0;z-index:5;text-align:left;min-width:52px;width:52px;font-size:10px;font-weight:600;background:var(--card)}
th.c-l1{z-index:31}
th.c-l2,td.c-l2{position:sticky;left:52px;z-index:5;text-align:left;min-width:34px;width:34px;font-size:10px;background:var(--card);border-right:2px solid rgba(0,0,0,0.1);box-shadow:3px 0 5px -2px rgba(0,0,0,.07)}
th.c-l2{z-index:31}
th.c-l1,th.c-l2{background:#374151;color:#fff}
tr.weekend td{background:#fff8f0!important}
tr.weekend td.c-l1,tr.weekend td.c-l2{background:#fff0e0!important}
tr.wk-sep td{border-top:2px solid #c8c8d0!important}
tr.tot td{background:#f0f4ff!important;font-weight:700;border-top:2px solid #b0c0e0}
tr.tot td.c-l1,tr.tot td.c-l2{background:#e0e8ff!important}
.d5{color:#15803d;font-weight:700;background:rgba(21,128,61,.08);border-radius:3px;padding:1px 3px}
.d4{color:#16a34a;font-weight:600}
.d3{color:#6b7280;font-weight:600}
.d2{color:#c2410c;font-weight:600}
.d1{color:#b91c1c;font-weight:700;background:rgba(185,28,28,.08);border-radius:3px;padding:1px 3px}
tr.diff-row td{background:#fefce8;font-size:10px;color:#7c2d12;border-bottom:1px solid #fde68a}
tr.diff-row td.diff-pos{color:#15803d}
tr.diff-row td.diff-neg{color:#b91c1c}
.chart-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.chart-wrap{position:relative;height:360px}
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.ctrl-lbl{font-size:11px;font-weight:600;color:var(--text-sec);margin-right:2px}
.status-box{padding:40px;text-align:center;color:var(--text-sec);font-size:14px}
.status-box.error{color:#ff3b30}
#storePills{flex-wrap:nowrap !important;overflow-x:auto !important;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;gap:14px">
    <a href="index.html" class="back-link">← Назад</a>
    <div class="page-title">Дельта щоденна</div>
  </div>
</div>

<div class="tabs" id="tabsEl">
  <button class="tab active" onclick="switchTab('table')">📋 Таблиця</button>
  <button class="tab" onclick="switchTab('weekday')">📅 Пн–Чт / Пт–Нд</button>
  <button class="tab" onclick="switchTab('weekly')">📆 По тижнях</button>
  <button class="tab" onclick="switchTab('monthly')">🗓 По місяцях</button>
  <button class="tab" onclick="switchTab('chart')">📈 Динаміка</button>
</div>

<div class="filters-wrap" id="filtersWrap" style="display:none">
  <div class="filter-row">
    <span class="filter-label">Рік</span>
    <div id="yearPills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Місяць</span>
    <div id="monthPills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Магазин</span>
    <div id="storePills" style="display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">ДНІ</span>
    <div id="segmentPills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
  </div>
</div>

<div id="tabContent">
  <div class="table-card"><div class="status-box">Завантаження…</div></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVyY9d_BjUGvXWa3VUFsdMoBwZH-MINuS8b91-lgNqeNMx-6UsE5oRJ66x6XVmK_JhXcGTbSK9Emx/pub?output=csv';
const MONTHS_UK = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOW_WE = ["пт","сб","нд","субота","неділя","friday","saturday","sunday","пятниця"];
const STORE_HDR = ['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e','#1e40af','#7c3aed'];
const STORE_BG  = ['#eff6ff','#ecfeff','#faf5ff','#fdf2f8','#ecfdf5','#fffbeb','#eff6ff','#f5f3ff'];

// STATE
let stores = [], dataRows = [], allYears = [], allMonths = [];
let selYears = new Set(), selMonths = new Set(), selStores = new Set();
let selSegments = new Set(['wd','we']);
let activeTab = 'table', chartInstance = null;
let selChartMode = 'store', selChartStore = '', selChartPeriod = 'day', selChartMetric = 'delta';

function parseCSV(text){
    const res = []; let row = [], col = '', inQ = false;
    for(let i = 0; i < text.length; i++){
        const c = text[i];
        if(c === '"' && text[i+1] === '"'){ col += '"'; i++; }
        else if(c === '"') inQ = !inQ;
        else if(c === ',' && !inQ){ row.push(col.trim()); col = ''; }
        else if((c === '\n' || c === '\r') && !inQ){
            if(c === '\r' && text[i+1] === '\n') i++;
            row.push(col.trim()); res.push(row); row = []; col = '';
        }
        else col += c;
    }
    if(col || row.length){ row.push(col.trim()); res.push(row); }
    return res.filter(r => r.some(c => c));
}

function toN(v){
    if(!v && v !== 0) return null;
    const s = String(v).replace(/\s|\u00a0/g,'').replace(',','.').replace('%','');
    if(['#div/0!','#value!','#n/a','#ref!'].includes(s.toLowerCase())) return null;
    const n = parseFloat(s); return isNaN(n) ? null : n;
}

function fmt(v){
    if(v === null || v === undefined) return '—';
    const n = Number(v); if(isNaN(n)) return '—';
    if(Math.abs(n) >= 1000000) return (n/1000000).toFixed(2)+'М';
    if(Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'К';
    if(n % 1 !== 0) return n.toFixed(2);
    return n.toLocaleString('uk-UA');
}

function fmtDate(d){
    if(!d) return '';
    const parts = d.replace(/\//g,'.').split('.');
    if(parts.length === 3){
        const [a,b,c] = parts;
        if(a.length === 4) return `${c}.${b}`;
        return `${a}.${b}`;
    }
    return d;
}

function isWeekend(dow){
    return DOW_WE.some(w => String(dow).toLowerCase().trim() === w || String(dow).toLowerCase().includes(w));
}

// detect, activeData, activeStores, renderFilters — залишаємо без змін (з попередньої версії)
// для економії місця не дублюю їх тут, вставте з попереднього робочого коду

// ── CHART TAB ──
function renderChart(){
    const cont = document.getElementById('tabContent');
    const data = activeData();
    if(!data.length){
        cont.innerHTML = '<div class="chart-card"><div class="status-box">Немає даних</div></div>';
        return;
    }
    const sts = activeStores();
    if(!selChartStore || !sts.find(s => s.name === selChartStore)) selChartStore = sts[0]?.name || '';

    const card = document.createElement('div'); card.className = 'chart-card';

    // Controls (без змін)
    const c0 = document.createElement('div'); c0.className = 'ctrl-row';
    c0.appendChild(Object.assign(document.createElement('span'),{className:'ctrl-lbl',textContent:'Режим:'}));
    [{v:'store',l:'Один магазин, всі дні'},{v:'allstores',l:'Всі магазини, один період'}].forEach(m => {
        const b = document.createElement('button'); b.className = 'pill' + (selChartMode === m.v ? ' active' : '');
        b.textContent = m.l; if(selChartMode === m.v){ b.style.background='#374151'; b.style.color='#fff'; }
        b.onclick = () => { selChartMode = m.v; renderChart(); }; c0.appendChild(b);
    });
    card.appendChild(c0);

    const c1 = document.createElement('div'); c1.className = 'ctrl-row';
    c1.appendChild(Object.assign(document.createElement('span'),{className:'ctrl-lbl',textContent:'Групування:'}));
    [{v:'day',l:'День'},{v:'week',l:'Тиждень'},{v:'month',l:'Місяць'}].forEach(p => {
        const b = document.createElement('button'); b.className = 'pill' + (selChartPeriod === p.v ? ' active' : '');
        b.textContent = p.l; if(selChartPeriod === p.v){ b.style.background='#0071e3'; b.style.color='#fff'; }
        b.onclick = () => { selChartPeriod = p.v; renderChart(); }; c1.appendChild(b);
    });
    card.appendChild(c1);

    const c2 = document.createElement('div'); c2.className = 'ctrl-row';
    c2.appendChild(Object.assign(document.createElement('span'),{className:'ctrl-lbl',textContent:'Показник:'}));
    [{v:'delta',l:'Δ Дельта'},{v:'foks',l:'Фокстрот'},{v:'komf',l:'Комфі'}].forEach(m => {
        const b = document.createElement('button'); b.className = 'pill' + (selChartMetric === m.v ? ' active' : '');
        b.textContent = m.l; if(selChartMetric === m.v){ b.style.background='#6b21a8'; b.style.color='#fff'; }
        b.onclick = () => { selChartMetric = m.v; renderChart(); }; c2.appendChild(b);
    });
    if(selChartMode === 'store'){
        c2.appendChild(Object.assign(document.createElement('span'),{className:'ctrl-lbl',textContent:'  Магазин:',style:'margin-left:8px'}));
        sts.forEach(st => {
            const b = document.createElement('button'); b.className = 'pill' + (st.name === selChartStore ? ' active' : '');
            b.textContent = st.name.split(' ').slice(1,4).join(' '); b.title = st.name;
            if(st.name === selChartStore){ b.style.background='#1d1d1f'; b.style.color='#fff'; }
            b.onclick = () => { selChartStore = st.name; renderChart(); }; c2.appendChild(b);
        });
    }
    card.appendChild(c2);

    function getVal(rows, stName){
        let f = 0, k = 0;
        rows.forEach(r => { const v = r.storeVals[stName] || {}; if(v.foks != null) f += v.foks; if(v.komf != null) k += v.komf; });
        if(selChartMetric === 'delta') return f > 0 ? k / f : null;
        if(selChartMetric === 'foks') return f || null;
        return k || null;
    }

    const gMap = new Map();
    data.forEach(r => {
        let k;
        if(selChartPeriod === 'day') k = r.date;
        else if(selChartPeriod === 'week') k = r.year + '_W' + String(r.week || 0).padStart(2,'0');
        else k = r.year + '_' + String(r.month).padStart(2,'0');
        if(!gMap.has(k)) gMap.set(k, []); gMap.get(k).push(r);
    });
    const sortedKeys = [...gMap.keys()].sort();
    const labels = sortedKeys.map(k => {
        if(selChartPeriod === 'day') return fmtDate(k);
        if(selChartPeriod === 'week'){ const p = k.split('_W'); return 'T' + p[1] + (p[0] ? ' ' + String(p[0]).slice(2) : ''); }
        const p = k.split('_'); const m = parseInt(p[1]); return MONTHS_UK[m-1]?.slice(0,3) + (p[0] ? ' ' + String(p[0]).slice(2) : '');
    });

    const datasets = [];
    const CHART_COLORS = ['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e'];

    const isSmallDataset = sortedKeys.length <= 40;

    if(selChartMode === 'store'){
        const vals = sortedKeys.map(k => getVal(gMap.get(k), selChartStore));
        const color = selChartMetric === 'delta' ? '#6b21a8' : (selChartMetric === 'foks' ? '#1a56db' : '#0e7490');
        const isBar = selChartMetric === 'delta';

        datasets.push({
            type: isBar ? 'bar' : 'line',
            label: selChartStore.split(' ').slice(1,3).join(' '),
            data: vals,
            backgroundColor: isBar ? vals.map(v => {
                if(v === null) return 'rgba(200,200,200,0.3)';
                if(v < 0.8) return 'rgba(21,128,61,0.7)';
                if(v < 0.95) return 'rgba(22,163,74,0.6)';
                if(v <= 1.05) return 'rgba(107,114,128,0.5)';
                if(v <= 1.25) return 'rgba(194,65,12,0.6)';
                return 'rgba(185,28,28,0.7)';
            }) : color + '33',
            borderColor: color,
            borderWidth: isBar ? 0 : 2.5,
            pointRadius: isSmallDataset ? 4 : 2,
            pointHoverRadius: 7,
            tension: 0.25,
            fill: !isBar,
            spanGaps: true,
            datalabels: {
                display: true,  // завжди показуємо, або isSmallDataset якщо хочете обмежити
                color: '#1d1d1f',
                backgroundColor: 'rgba(255,255,255,0.9)',
                borderRadius: 4,
                borderWidth: 1,
                borderColor: color + '88',
                padding: 6,
                font: { size: 10, weight: '600' },
                formatter: (value) => value === null ? '' : (selChartMetric === 'delta' ? value.toFixed(2) : fmt(value)),
                anchor: isBar ? 'end' : 'end',
                align: isBar ? 'top' : 'top',
                offset: isBar ? 4 : 8,
                clamp: true
            }
        });
    } else {
        sts.forEach((st, i) => {
            const color = CHART_COLORS[i % CHART_COLORS.length];
            const vals = sortedKeys.map(k => getVal(gMap.get(k), st.name));
            datasets.push({
                type: 'line',
                label: st.name.split(' ').slice(1,3).join(' '),
                data: vals,
                borderColor: color,
                backgroundColor: color + '22',
                borderWidth: 2.5,
                pointRadius: isSmallDataset ? 4 : 2,
                pointHoverRadius: 7,
                tension: 0.25,
                fill: false,
                spanGaps: true,
                datalabels: {
                    display: true,
                    color: '#1d1d1f',
                    backgroundColor: 'rgba(255,255,255,0.85)',
                    borderRadius: 4,
                    borderWidth: 1,
                    borderColor: color + '88',
                    padding: 6,
                    font: { size: 10, weight: '600' },
                    formatter: (value) => value === null ? '' : (selChartMetric === 'delta' ? value.toFixed(2) : fmt(value))
                }
            });
        });
    }

    const wrap = document.createElement('div'); wrap.className = 'chart-wrap';
    const canvas = document.createElement('canvas'); canvas.id = 'dailyChart';
    wrap.appendChild(canvas); card.appendChild(wrap);
    cont.innerHTML = ''; cont.appendChild(card);

    if(chartInstance){ chartInstance.destroy(); chartInstance = null; }

    const ctx = canvas.getContext('2d');
    chartInstance = new Chart(ctx, {
        plugins: [ChartDataLabels],
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: datasets.length > 1, position: 'top', labels: { font: { size: 11 }, boxWidth: 18, padding: 10 } },
                tooltip: {
                    backgroundColor: '#1d1d1f',
                    titleFont: { size: 12 },
                    bodyFont: { size: 12 },
                    padding: 12,
                    callbacks: {
                        label: c => ' ' + c.dataset.label + ': ' + (c.raw != null ? (selChartMetric === 'delta' ? c.raw.toFixed(2) : fmt(c.raw)) : '—')
                    }
                }
            },
            scales: {
                x: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 9 }, color: '#86868b', maxTicksLimit: 24, maxRotation: 45 } },
                y: {
                    grid: { color: '#f0f0f0' },
                    ticks: {
                        font: { size: 10 },
                        color: '#86868b',
                        callback: v => selChartMetric === 'delta' ? v.toFixed(2) : fmt(v)
                    },
                    ...(selChartMetric === 'delta' ? { suggestedMin: 0.5, suggestedMax: 1.5 } : {})
                }
            }
        }
    });
}

// ── SWITCH TAB ──
function switchTab(tab){
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`)?.classList.add('active');
    render();
}

function render(){
    if(activeTab === 'table') renderTable();
    else if(activeTab === 'weekday') renderWeekday();
    else if(activeTab === 'weekly') renderWeekly();
    else if(activeTab === 'monthly') renderMonthly();
    else renderChart();
}

// решта функцій (renderTable, renderWeekday, renderWeekly, renderMonthly, showSkel, detect, activeData, renderFilters тощо)
// копіюйте з попередньої робочої версії — вони не змінювалися

async function init(){
    // ... (showSkel, fetch CSV, detect, renderFilters, render) — без змін
    showSkel();
    try {
        const res = await fetch(CSV_URL + '&t=' + Date.now());
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        if(!rows.length) throw new Error('Порожній файл');
        detect(rows);
        if(!stores.length) throw new Error('Не знайдено магазини у файлі');
        renderFilters();
        render();
    } catch(e){
        document.getElementById('tabContent').innerHTML = '<div class="table-card"><div class="status-box error">❌ ' + e.message + '</div></div>';
        console.error(e);
    }
}

init();
</script>
</body>
</html>
