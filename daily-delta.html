<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Дельта щоденна</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root{--bg:#f5f5f7;--text:#1d1d1f;--text-sec:#6e6e73;--accent:#0071e3;--border:#d2d2d7;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,0.06);}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:8px 10px 60px}
        @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
        .skel{background:linear-gradient(90deg,#eaeaed 25%,#f5f5f7 50%,#eaeaed 75%);background-size:600px 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:7px}
        .skel-row{display:flex;gap:8px;padding:9px 10px;border-bottom:1px solid #f2f2f4}
        .skel-cell{height:11px;border-radius:5px;flex:1}.skel-cell.w{flex:2}

        /* TOP */
        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
        .back-link{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px}
        .page-title{font-size:20px;font-weight:700}

        /* TABS */
        .tabs{display:flex;gap:2px;background:#e5e5ea;border-radius:12px;padding:3px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .tab{border:none;background:transparent;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-sec);font-family:inherit;transition:all .2s;white-space:nowrap}
        .tab.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}

        /* FILTERS */
        .filters-wrap{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.06)}
        .filter-row{display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px;padding:8px 12px;border-bottom:1px solid #f0f0f2}
        .filter-row:last-child{border-bottom:none}
        .filter-label{font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.06em;padding-top:5px;margin-right:6px;white-space:nowrap}
        .pill{border:none;background:transparent;padding:4px 8px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#6e6e73;transition:all .15s;white-space:nowrap}
        .pill:hover{background:#f2f2f7;color:#1d1d1f}
        .pill.active{background:#1d1d1f;color:#fff}

        /* TABLE */
        .table-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
        .table-hint{font-size:11px;color:var(--text-sec);padding:8px 12px;border-bottom:1px solid #f2f2f4;background:#fafafa;border-radius:16px 16px 0 0}
        .table-hint .hl{color:var(--accent);font-weight:600}
        table{border-collapse:collapse;min-width:100%}
        th,td{padding:4px 7px;border-bottom:1px solid #f2f2f4;font-size:11px;text-align:right;white-space:nowrap}
        /* Sticky header — two rows */
        thead{position:sticky;top:0;z-index:20}
        th.grp{text-align:center;font-size:9px;font-weight:800;letter-spacing:.06em;color:#fff;border-bottom:1px solid rgba(255,255,255,0.2);height:22px}
        th.sub{font-size:9px;font-weight:700;color:rgba(255,255,255,0.85);text-transform:uppercase;height:20px;border-bottom:2px solid rgba(0,0,0,0.15)}
        /* Frozen date cols */
        th.c-date,td.c-date{position:sticky;left:0;z-index:5;text-align:left;min-width:54px;width:54px;font-size:10px;font-weight:600}
        th.c-date{z-index:25;background:inherit}
        td.c-date{background:var(--card);color:var(--text-sec)}
        th.c-dow,td.c-dow{position:sticky;left:54px;z-index:5;text-align:left;min-width:36px;width:36px;font-size:10px;border-right:2px solid rgba(0,0,0,0.12);box-shadow:3px 0 6px -2px rgba(0,0,0,.08)}
        th.c-dow{z-index:25;background:inherit}
        td.c-dow{background:var(--card);color:var(--text-sec)}
        /* Store color bands */
        .sc0{background:#1a56db}.sc1{background:#0e7490}.sc2{background:#6b21a8}.sc3{background:#9d174d}.sc4{background:#065f46}.sc5{background:#92400e}.sc6{background:#1e40af}.sc7{background:#7c3aed}
        tr.weekend td{background:#fff8f0}
        tr.weekend td.c-date,tr.weekend td.c-dow{background:#fff8f0}
        tr.week-start td{border-top:2px solid #d0d0da!important}
        /* Delta color scale: <1 = good (green), >1 = bad (red), gradient */
        .d-great{color:#1a7f37;font-weight:700}
        .d-good{color:#2d9e5a;font-weight:600}
        .d-ok{color:#6e6e73;font-weight:600}
        .d-warn{color:#c05000;font-weight:600}
        .d-bad{color:#c0392b;font-weight:700}
        /* Total/sum row */
        tr.total-row td{background:#f0f4ff;font-weight:700;font-size:11px;border-top:2px solid #b0c0e0}
        tr.total-row td.c-date,tr.total-row td.c-dow{background:#e8f0fe}
        /* Chart */
        .chart-wrap{position:relative;height:340px;padding:16px}
        @media(max-width:600px){.chart-wrap{height:240px}}

        .status-box{padding:40px;text-align:center;color:var(--text-sec);font-size:14px}
        .status-box.error{color:#ff3b30}

        /* SUMMARY TABS STYLES */
        .summary-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px}
        .section-title{font-size:13px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 2px}
        .badge-wd{background:rgba(0,113,227,.10);color:#1a50b8;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
        .badge-we{background:rgba(255,149,0,.12);color:#b85000;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
        .badge-wk{background:rgba(88,86,214,.10);color:#4342a8;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px">
        <a href="index.html" class="back-link">← Назад</a>
        <div class="page-title">Дельта щоденна</div>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('table')">📋 Таблиця</button>
    <button class="tab" onclick="switchTab('weekday')">📅 Пн–Чт / Пт–Нд</button>
    <button class="tab" onclick="switchTab('weekly')">📆 По тижнях</button>
    <button class="tab" onclick="switchTab('monthly')">📅 По місяцях</button>
    <button class="tab" onclick="switchTab('chart')">📈 Динаміка</button>
</div>

<div class="filters-wrap" id="filtersWrap" style="display:none">
    <div class="filter-row" id="filterYearRow">
        <span class="filter-label">Рік</span>
        <div id="yearPills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
    </div>
    <div class="filter-row" id="filterMonthRow">
        <span class="filter-label">Місяць</span>
        <div id="monthPills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
    </div>
    <div class="filter-row" id="filterStoreRow">
        <span class="filter-label">Магазин</span>
        <div id="storePills" style="display:flex;gap:3px;flex-wrap:wrap"></div>
    </div>
</div>

<div id="tabContent">
    <div class="table-card"><div class="status-box">Завантаження…</div></div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVyY9d_BjUGvXWa3VUFsdMoBwZH-MINuS8b91-lgNqeNMx-6UsE5oRJ66x6XVmK_JhXcGTbSK9Emx/pub?output=csv';
const MONTHS_UK=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOW_WE=['пт','сб','нд','п\'ятниця','субота','неділя','friday','saturday','sunday','5','6','7'];

// STATE
let stores=[];   // [{name, cols:[{type:'foks'|'komf'|'delta', colIdx}]}]
let dataRows=[]; // [{year,month,week,dow,dowNum,date,storeVals:{storeName:{foks,komf,delta}}}]
let allYears=[],allMonths=[];
let selYears=new Set(),selMonths=new Set(),selStores=new Set();
let activeTab='table';

function parseCSV(text){
    const res=[];let row=[],col='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
        else if(c==='"')inQ=!inQ;
        else if(c===','&&!inQ){row.push(col.trim());col='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(col.trim());res.push(row);row=[];col='';}
        else col+=c;
    }
    if(col||row.length){row.push(col.trim());res.push(row);}
    return res.filter(r=>r.some(c=>c));
}
function toN(v){
    if(!v&&v!==0)return null;
    const s=String(v).replace(/\s|\u00a0/g,'').replace(',','.').replace('%','');
    if(['#div/0!','#value!','#n/a','#ref!'].includes(s.toLowerCase()))return null;
    const n=parseFloat(s);return isNaN(n)?null:n;
}
function fmt(v){
    if(v===null||v===undefined)return'—';
    const n=Number(v);if(isNaN(n))return'—';
    if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+'М';
    if(Math.abs(n)>=1000)return(n/1000).toFixed(1)+'К';
    if(n%1!==0)return n.toFixed(2);
    return n.toLocaleString('uk-UA');
}
function fmtDate(d){
    if(!d)return'';
    // try parse DD.MM.YYYY or YYYY-MM-DD
    const parts=d.replace(/\//g,'.').split('.');
    if(parts.length===3){
        const [a,b,c]=parts;
        if(a.length===4)return`${c}.${b}`;// YYYY.MM.DD → DD.MM
        return`${a}.${b}`;// DD.MM.YYYY → DD.MM
    }
    return d;
}
function isWeekend(dow){
    return DOW_WE.some(w=>String(dow).toLowerCase().trim()===w||String(dow).toLowerCase().includes(w));
}

function detect(rows){
    // Структура CSV (зі скріншота):
    // Row 0 (idx 0): порожні A-F, потім загальні суми (TOTAL рядок 1)
    // Row 1 (idx 1): TOTAL, YEAR, PERIOD у перших колонках + числа сум
    // Row 2 (idx 2): назви магазинів (починаючи з col 7/H), з пробілами між магазинами
    // Row 3 (idx 3): підколонки — Фокстрот, Комфі, Дельта день (повторюється)
    // Row 4+ : дані — рік(0), тиждень(1), №місяця(2), місяць(3), деньЦифра(4), деньНазва(5), дата(6)

    // Знаходимо рядок з підколонками (містить 'фокстрот' і 'комфі' як окремі значення)
    let subRow=-1, storeRow=-1;
    for(let i=0;i<Math.min(8,rows.length);i++){
        const r=rows[i].map(c=>(c||'').toLowerCase().trim());
        const hasFoks=r.filter(c=>c==='фокстрот').length;
        const hasKomf=r.filter(c=>c==='комфі').length;
        if(hasFoks>=1&&hasKomf>=1){subRow=i;storeRow=i-1;break;}
    }
    if(subRow===-1){
        // Fallback: шукаємо рядок де є 'фокс' і 'комф'
        for(let i=0;i<Math.min(8,rows.length);i++){
            const r=rows[i].map(c=>(c||'').toLowerCase().trim());
            if(r.some(c=>c.includes('фокс'))&&r.some(c=>c.includes('комф'))){
                subRow=i;storeRow=i-1;break;
            }
        }
    }
    if(subRow===-1){subRow=3;storeRow=2;}

    const storeRowData=rows[storeRow]||[];
    const subRowData=rows[subRow]||[];

    // Парсимо магазини: назва магазину в storeRowData, підколонки в subRowData
    // Назва магазину може займати 3 колонки (Фокс+Комфі+Дельта), між магазинами порожні колонки
    stores=[];
    let curStore='';
    for(let i=7;i<Math.max(storeRowData.length,subRowData.length);i++){
        const sn=(storeRowData[i]||'').trim();
        if(sn) curStore=sn;
        if(!curStore) continue;
        const sub=(subRowData[i]||'').toLowerCase().trim();
        if(!sub) continue;
        let type=null;
        if(sub==='фокстрот'||sub.includes('фокс')) type='foks';
        else if(sub==='комфі'||sub.includes('комф')) type='komf';
        else if(sub.includes('дельт')||sub.includes('delta')) type='delta';
        if(!type) continue;
        let st=stores.find(s=>s.name===curStore);
        if(!st){st={name:curStore,cols:[]};stores.push(st);}
        st.cols.push({type,colIdx:i});
    }

    const dataStart=subRow+1;
    dataRows=[];
    const yrs=new Set(),mos=new Set();
    for(let ri=dataStart;ri<rows.length;ri++){
        const row=rows[ri];
        if(!row.some(c=>c)) continue;

        // Визначаємо поля дати: рік(0),тиждень(1),№міс(2),місяць(3),деньЦифра(4),деньНазва(5),дата(6)
        const year=toN(row[0]);
        const week=toN(row[1]);
        const monthNum=toN(row[2]);
        const monthName=(row[3]||'').trim();
        const dowNumRaw=toN(row[4]);  // цифра дня тижня
        const dowName=(row[5]||'').trim(); // назва дня тижня
        const dateStr=(row[6]||'').trim();

        if(!year||!dateStr) continue;

        // Місяць
        const mo=monthNum||(()=>{
            const lo=monthName.toLowerCase();
            const idx=MONTHS_UK.findIndex(m=>lo.includes(m.slice(0,3).toLowerCase()));
            return idx>=0?idx+1:null;
        })();
        if(!mo) continue;

        // День тижня (1=Пн...7=Нд)
        let dowNum=dowNumRaw||0;
        if(!dowNum){
            const dowLo=dowName.toLowerCase();
            const dowMap={понеділок:1,пн:1,вівторок:2,вт:2,середа:3,ср:3,четвер:4,чт:4,"п'ятниця":5,пятниця:5,пт:5,субота:6,сб:6,неділя:7,нд:7};
            for(const[k,v]of Object.entries(dowMap)){if(dowLo===k||dowLo.startsWith(k)){dowNum=v;break;}}
        }

        const storeVals={};
        stores.forEach(st=>{
            const fCol=st.cols.find(c=>c.type==='foks');
            const kCol=st.cols.find(c=>c.type==='komf');
            const dCol=st.cols.find(c=>c.type==='delta');
            const fv=fCol?toN(row[fCol.colIdx]):null;
            const kv=kCol?toN(row[kCol.colIdx]):null;
            let dv=dCol?toN(row[dCol.colIdx]):null;
            if(dv===null&&fv!=null&&kv!=null&&fv!==0) dv=kv/fv;
            storeVals[st.name]={foks:fv,komf:kv,delta:dv};
        });

        const isWE=dowNum>=5||(dowNum===0&&isWeekend(dowName));
        dataRows.push({year,month:mo,week,dowName,dowNum,date:dateStr,storeVals,isWE});
        yrs.add(year);mos.add(mo);
    }
    allYears=[...yrs].sort((a,b)=>a-b);
    allMonths=[...mos].sort((a,b)=>a-b);
    selYears=new Set(allYears);
    selMonths=new Set(allMonths);
    selStores=new Set(stores.map(s=>s.name));
}

function activeData(){
    return dataRows.filter(r=>selYears.has(r.year)&&selMonths.has(r.month));
}
function activeStores(){
    return stores.filter(s=>selStores.has(s.name));
}

// ── FILTERS ──
function renderFilters(){
    renderPills('yearPills',allYears,selYears,'#1d1d1f',y=>String(y),(y)=>{
        if(selYears.has(y)){if(selYears.size>1)selYears.delete(y);}else selYears.add(y);
        renderFilters();render();
    });
    renderPills('monthPills',allMonths,selMonths,'#1d1d1f',m=>MONTHS_UK[m-1].slice(0,3),(m)=>{
        if(selMonths.has(m)){if(selMonths.size>1)selMonths.delete(m);}else selMonths.add(m);
        renderFilters();render();
    });
    renderPills('storePills',stores.map(s=>s.name),selStores,'#0071e3',n=>n,(n)=>{
        if(selStores.has(n)){if(selStores.size>1)selStores.delete(n);}else selStores.add(n);
        renderFilters();render();
    });
    document.getElementById('filtersWrap').style.display='';
}
function renderPills(id,items,selSet,color,label,onclick){
    const el=document.getElementById(id);el.innerHTML='';
    items.forEach(item=>{
        const act=selSet.has(item);
        const b=document.createElement('button');b.className='pill'+(act?' active':'');
        b.textContent=label(item);
        if(act){b.style.background=color;b.style.color='#fff';}
        b.onclick=()=>onclick(item);
        el.appendChild(b);
    });
}

function deltaClass(d){
    if(d===null||d===undefined)return'';
    if(d<0.9)return'd-great';
    if(d<1.0)return'd-good';
    if(d<=1.1)return'd-ok';
    if(d<=1.3)return'd-warn';
    return'd-bad';
}
// store color
const STORE_BG=['#eff6ff','#ecfeff','#faf5ff','#fdf2f8','#ecfdf5','#fffbeb','#eff6ff','#f5f3ff'];
const STORE_HDR=['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e','#1e40af','#7c3aed'];

function mkTh(text,cls,extra){const t=document.createElement('th');t.textContent=text;if(cls)t.className=cls;if(extra)Object.assign(t.style,extra);return t;}
function mkTd(text,cls,extra){const t=document.createElement('td');t.textContent=text||'—';if(cls)t.className=cls;if(extra)Object.assign(t.style,extra);return t;}

// ── TABLE TAB ──
function renderTable(){
    const cont=document.getElementById('tabContent');
    const data=activeData();
    const sts=activeStores();
    if(!data.length){cont.innerHTML='<div class="table-card"><div class="status-box">Немає даних</div></div>';return;}

    const card=document.createElement('div');card.className='table-card';
    const hint=document.createElement('div');hint.className='table-hint';
    hint.innerHTML='Пн–Чт — <span class="hl">будні</span> | Пт–Нд — <span style="color:#ff9500;font-weight:600">вихідні</span> | Δ: <span class="d-great">&#60;0.9</span> <span class="d-good">0.9–1.0</span> <span class="d-ok">~1.0</span> <span class="d-warn">1.1–1.3</span> <span class="d-bad">&#62;1.3</span>';
    card.appendChild(hint);

    const wrap=document.createElement('div');wrap.className='table-wrap';
    const tbl=document.createElement('table');
    const thead=document.createElement('thead');

    // Row 1 — store name headers (colored bg)
    const trG=document.createElement('tr');
    const thDate=mkTh('Дата','c-date grp');thDate.rowSpan=2;thDate.style.background='#374151';thDate.style.color='#fff';trG.appendChild(thDate);
    const thDow=mkTh('День','c-dow grp');thDow.rowSpan=2;thDow.style.background='#374151';thDow.style.color='#fff';trG.appendChild(thDow);
    sts.forEach((st,i)=>{
        const hdr=STORE_HDR[i%STORE_HDR.length];
        const th=mkTh(st.name,'grp',{background:hdr,color:'#fff',borderLeft:i>0?'2px solid rgba(255,255,255,0.3)':''});
        th.colSpan=3;th.title=st.name;trG.appendChild(th);
    });
    thead.appendChild(trG);

    // Row 2 — sub-col headers
    const trH=document.createElement('tr');
    sts.forEach((st,i)=>{
        const hdr=STORE_HDR[i%STORE_HDR.length];
        ['Фокс','Комфі','Δ'].forEach((lbl,j)=>{
            const th=mkTh(lbl,'sub',{background:hdr,borderLeft:j===0&&i>0?'2px solid rgba(255,255,255,0.3)':''});
            trH.appendChild(th);
        });
    });
    thead.appendChild(trH);tbl.appendChild(thead);

    const tbody=document.createElement('tbody');
    let prevWeek=null;

    data.forEach(r=>{
        const tr=document.createElement('tr');
        if(r.isWE)tr.classList.add('weekend');
        if(r.week&&r.week!==prevWeek){tr.classList.add('week-start');prevWeek=r.week;}

        tr.appendChild(mkTd(fmtDate(r.date),'c-fix c-date'));
        const dow=r.dowName?r.dowName.slice(0,2):'';
        tr.appendChild(mkTd(dow,'c-fix c-dow'));

        sts.forEach((st,i)=>{
            const bg=STORE_BG[i%STORE_BG.length];
            const v=r.storeVals[st.name]||{};
            const f=v.foks??null,k=v.komf??null;
            const d=v.delta??((f!=null&&k!=null&&f!==0)?k/f:null);
            const sep=i>0?'border-left:2px solid #d0d0da':'';
            const tdF=mkTd(fmt(f),'',{background:bg,borderLeft:i>0?'2px solid #d0d0da':''});tr.appendChild(tdF);
            const tdK=mkTd(fmt(k),'',{background:bg});tr.appendChild(tdK);
            const tdD=mkTd(d!=null?d.toFixed(2):null,deltaClass(d),{background:bg});tr.appendChild(tdD);
        });
        tbody.appendChild(tr);
    });

    // TOTAL ROW — per store
    const trTot=document.createElement('tr');trTot.className='total-row';
    trTot.appendChild(mkTd('РАЗОМ','c-fix c-date'));
    trTot.appendChild(mkTd('','c-fix c-dow'));
    sts.forEach((st,i)=>{
        let sf=0,sk=0;
        data.forEach(r=>{const v=r.storeVals[st.name]||{};if(v.foks!=null)sf+=v.foks;if(v.komf!=null)sk+=v.komf;});
        const sd=sf>0?sk/sf:null;
        const bg=STORE_BG[i%STORE_BG.length];
        trTot.appendChild(mkTd(fmt(sf),'',{background:bg,borderLeft:i>0?'2px solid #d0d0da':'',fontWeight:'700'}));
        trTot.appendChild(mkTd(fmt(sk),'',{background:bg,fontWeight:'700'}));
        trTot.appendChild(mkTd(sd!=null?sd.toFixed(2):null,deltaClass(sd),{background:bg,fontWeight:'700'}));
    });
    tbody.appendChild(trTot);

    tbl.appendChild(tbody);wrap.appendChild(tbl);card.appendChild(wrap);
    cont.innerHTML='';cont.appendChild(card);
}

// ── WEEKDAY TAB (Пн–Чт / Пт–Нд per week) ──
function renderWeekday(){
    const cont=document.getElementById('tabContent');
    const data=activeData();
    const sts=activeStores();
    if(!data.length){cont.innerHTML='<div class="table-card"><div class="status-box">Немає даних</div></div>';return;}

    // Group by year+week
    const weekMap=new Map();
    data.forEach(r=>{
        if(!r.week)return;
        const wk=r.year+'_W'+String(r.week).padStart(2,'0');
        if(!weekMap.has(wk))weekMap.set(wk,{year:r.year,week:r.week,wd:[],we:[]});
        const wData=weekMap.get(wk);
        if(r.isWE)wData.we.push(r);else wData.wd.push(r);
    });

    const card=document.createElement('div');card.className='table-card';
    const hint=document.createElement('div');hint.className='table-hint';
    hint.innerHTML='<span class="badge-wd">Пн–Чт</span> та <span class="badge-we">Пт–Нд</span> — суми за кожен тиждень';
    card.appendChild(hint);
    const wrap=document.createElement('div');wrap.className='table-wrap';

    const tbl=document.createElement('table');
    const thead=document.createElement('thead');
    const trG=document.createElement('tr');
    // Fixed cols
    const thYr=document.createElement('th');thYr.className='c-fix c-date grp sticky-grp';thYr.rowSpan=2;thYr.textContent='Рік';trG.appendChild(thYr);
    const thWk=document.createElement('th');thWk.className='c-fix c-dow grp sticky-grp';thWk.rowSpan=2;thWk.textContent='Тиж';trG.appendChild(thWk);
    // Groups for each store × 2 segments
    sts.forEach((st,i)=>{
        ['Пн–Чт','Пт–Нд'].forEach((seg,j)=>{
            const th=document.createElement('th');th.className='grp sticky-grp';th.colSpan=3;
            th.textContent=st.name+' '+seg;
            if(i>0&&j===0)th.classList.add('grp-sep');
            trG.appendChild(th);
        });
    });
    // Total
    ['Пн–Чт','Пт–Нд'].forEach((seg,j)=>{
        const th=document.createElement('th');th.className='grp sticky-grp';th.colSpan=3;th.textContent='РАЗОМ '+seg;
        if(j===0)th.classList.add('grp-sep');trG.appendChild(th);
    });
    thead.appendChild(trG);
    const trH=document.createElement('tr');
    const addSubCols=(n)=>{for(let i=0;i<n;i++)['Фокс','Комфі','Δ'].forEach(l=>{const th=document.createElement('th');th.textContent=l;trH.appendChild(th);});};
    addSubCols(sts.length*2+2);
    thead.appendChild(trH);tbl.appendChild(thead);

    const tbody=document.createElement('tbody');
    const sortedWeeks=[...weekMap.keys()].sort();
    sortedWeeks.forEach(wk=>{
        const {year,week,wd,we}=weekMap.get(wk);
        const tr=document.createElement('tr');
        const tdY=document.createElement('td');tdY.className='c-fix c-date';tdY.textContent=year;tr.appendChild(tdY);
        const tdW=document.createElement('td');tdW.className='c-fix c-dow';tdW.textContent='T'+week;tr.appendChild(tdW);

        const calc=(rows,stName)=>{
            let f=0,k=0;
            rows.forEach(r=>{const v=r.storeVals[stName]||{};if(v.foks!=null)f+=v.foks;if(v.komf!=null)k+=v.komf;});
            return{f,k,d:f>0?k/f:null};
        };
        const addCell=(val,cls,first,grpSep)=>{
            const td=document.createElement('td');
            if(val!=null){td.textContent=typeof val==='number'&&!Number.isInteger(val)?val.toFixed(2):fmt(val);}else td.textContent='—';
            if(cls)td.className=cls;if(grpSep)td.classList.add('grp-sep');
            tr.appendChild(td);
        };

        let totWdF=0,totWdK=0,totWeF=0,totWeK=0;
        sts.forEach((st,i)=>{
            const r1=calc(wd,st.name);const r2=calc(we,st.name);
            totWdF+=r1.f;totWdK+=r1.k;totWeF+=r2.f;totWeK+=r2.k;
            addCell(r1.f,'',(i===0),i>0);addCell(r1.k);
            addCell(r1.d,r1.d!=null?(r1.d>1?'dpos':r1.d<1?'dneg':''):'');
            addCell(r2.f);addCell(r2.k);
            addCell(r2.d,r2.d!=null?(r2.d>1?'dpos':r2.d<1?'dneg':''):'');
        });
        const td1=totWdF>0?totWdK/totWdF:null,td2=totWeF>0?totWeK/totWeF:null;
        addCell(totWdF,'',false,true);addCell(totWdK);addCell(td1,td1!=null?(td1>1?'dpos':td1<1?'dneg':''):'');
        addCell(totWeF);addCell(totWeK);addCell(td2,td2!=null?(td2>1?'dpos':td2<1?'dneg':''):'');

        tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);wrap.appendChild(tbl);card.appendChild(wrap);
    cont.innerHTML='';cont.appendChild(card);
}

    const thWk=document.createElement('th');thWk.className='c-fix c-dow grp sticky-grp';thWk.rowSpan=2;thWk.textContent='Тиж';trG.appendChild(thWk);

        });

        const tdW=document.createElement('td');tdW.className='c-fix c-dow';tdW.textContent='T'+week;tr.appendChild(tdW);
        let totF=0,totK=0;
        sts.forEach((st,i)=>{
            let f=0,k=0;
            rows.forEach(r=>{const v=r.storeVals[st.name]||{};if(v.foks!=null)f+=v.foks;if(v.komf!=null)k+=v.komf;});
            totF+=f;totK+=k;
            const d=f>0?k/f:null;
            const t1=document.createElement('td');t1.textContent=fmt(f);if(i>0)t1.classList.add('grp-sep');tr.appendChild(t1);
            const t2=document.createElement('td');t2.textContent=fmt(k);tr.appendChild(t2);
            const t3=document.createElement('td');if(d!=null){t3.textContent=d.toFixed(2);t3.className=deltaClass(d);}else t3.textContent='—';tr.appendChild(t3);
        });
        const gd=totF>0?totK/totF:null;
        const g1=document.createElement('td');g1.textContent=fmt(totF);g1.classList.add('grp-sep');tr.appendChild(g1);
        const g2=document.createElement('td');g2.textContent=fmt(totK);tr.appendChild(g2);
        const g3=document.createElement('td');if(gd!=null){g3.textContent=gd.toFixed(2);g3.className=deltaClass(gd);}else g3.textContent='—';tr.appendChild(g3);
        tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);wrap.appendChild(tbl);card.appendChild(wrap);
    cont.innerHTML='';cont.appendChild(card);
}

function render(){
    if(activeTab==='table')renderTable();
    else if(activeTab==='weekday')renderWeekday();
    else if(activeTab==='weekly')renderWeekly();
    else if(activeTab==='monthly')renderMonthly();
    else renderChart();
}

// ── CHART TAB ──
let selChartStore='',selChartMetric='delta';
function renderChart(){
    const cont=document.getElementById('tabContent');
    const data=activeData();
    if(!data.length){cont.innerHTML='<div class="table-card"><div class="status-box">Немає даних</div></div>';return;}
    const sts=activeStores();
    if(!selChartStore||!sts.find(s=>s.name===selChartStore))selChartStore=sts[0]?.name||'';

    const card=document.createElement('div');card.className='table-card';card.style.padding='16px';

    // Controls
    const ctrl=document.createElement('div');ctrl.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center';
    const lbl1=document.createElement('span');lbl1.style.cssText='font-size:11px;font-weight:600;color:var(--text-sec)';lbl1.textContent='Магазин:';
    ctrl.appendChild(lbl1);
    sts.forEach(st=>{
        const b=document.createElement('button');
        b.className='pill'+(st.name===selChartStore?' active':'');
        b.textContent=st.name.split(' ').slice(0,3).join(' ');b.title=st.name;
        if(st.name===selChartStore){b.style.background='#1d1d1f';b.style.color='#fff';}
        b.onclick=()=>{selChartStore=st.name;renderChart();};
        ctrl.appendChild(b);
    });
    const lbl2=document.createElement('span');lbl2.style.cssText='font-size:11px;font-weight:600;color:var(--text-sec);margin-left:8px';lbl2.textContent='Показник:';
    ctrl.appendChild(lbl2);
    [{v:'delta',l:'Δ Дельта'},{v:'foks',l:'Фокстрот'},{v:'komf',l:'Комфі'}].forEach(m=>{
        const b=document.createElement('button');b.className='pill'+(m.v===selChartMetric?' active':'');
        b.textContent=m.l;
        if(m.v===selChartMetric){b.style.background='#0071e3';b.style.color='#fff';}
        b.onclick=()=>{selChartMetric=m.v;renderChart();};
        ctrl.appendChild(b);
    });
    card.appendChild(ctrl);

    const chartDiv=document.createElement('div');chartDiv.className='chart-wrap';
    const canvas=document.createElement('canvas');canvas.id='dailyChart';
    chartDiv.appendChild(canvas);card.appendChild(chartDiv);

    cont.innerHTML='';cont.appendChild(card);

    // Build data
    const labels=data.map(r=>fmtDate(r.date));
    const vals=data.map(r=>{
        const v=r.storeVals[selChartStore]||{};
        if(selChartMetric==='delta')return v.delta??((v.foks&&v.komf&&v.foks!==0)?v.komf/v.foks:null);
        if(selChartMetric==='foks')return v.foks??null;
        return v.komf??null;
    });
    const color=selChartMetric==='delta'?'#6b21a8':selChartMetric==='foks'?'#1a56db':'#0e7490';
    const bgColors=selChartMetric==='delta'?vals.map(v=>{
        if(v===null)return'rgba(200,200,200,0.2)';
        if(v<0.9)return'rgba(26,127,55,0.7)';
        if(v<1.0)return'rgba(45,158,90,0.6)';
        if(v<=1.1)return'rgba(110,110,115,0.5)';
        if(v<=1.3)return'rgba(192,80,0,0.65)';
        return'rgba(192,57,43,0.75)';
    }):null;

    if(chartInstance){chartInstance.destroy();chartInstance=null;}
    const ctx=canvas.getContext('2d');
    const isBar=selChartMetric==='delta';
    chartInstance=new Chart(ctx,{
        type:isBar?'bar':'line',
        data:{
            labels,
            datasets:[{
                label:(selChartMetric==='delta'?'Δ ':selChartMetric==='foks'?'Фокс ':'Комфі ')+selChartStore.split(' ').slice(0,3).join(' '),
                data:vals,
                backgroundColor:isBar?bgColors:color+'22',
                borderColor:color,
                borderWidth:isBar?0:2,
                pointRadius:data.length>60?0:3,
                pointHoverRadius:6,
                tension:0.3,fill:!isBar,spanGaps:true
            }]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{
                legend:{display:false},
                tooltip:{backgroundColor:'#1d1d1f',callbacks:{
                    label:c=>` ${c.dataset.label}: ${c.raw!=null?c.raw.toFixed(2):'—'}`
                }}
            },
            scales:{
                x:{grid:{color:'#f0f0f0'},ticks:{font:{size:9},color:'#86868b',maxTicksLimit:20,maxRotation:45}},
                y:{grid:{color:'#f0f0f0'},ticks:{font:{size:10},color:'#86868b'},
                   ...(selChartMetric==='delta'?{min:0.5}:{})}
            }
        }
    });
}

let chartInstance=null;
function switchTab(tab){
    activeTab=tab;
    document.querySelectorAll('.tab').forEach((b,i)=>{
        b.classList.toggle('active',['table','weekday','weekly','monthly','chart'][i]===tab);
    });
    render();
}

function showSkel(){
    const cont=document.getElementById('tabContent');
    const card=document.createElement('div');card.className='table-card';
    const wrap=document.createElement('div');
    for(let i=0;i<14;i++){
        const row=document.createElement('div');row.className='skel-row';
        for(let j=0;j<6;j++){const c=document.createElement('div');c.className='skel-cell skel'+(j<2?' w':'');c.style.animationDelay=(i*.04+j*.015)+'s';row.appendChild(c);}
        wrap.appendChild(row);
    }
    card.appendChild(wrap);cont.innerHTML='';cont.appendChild(card);
}

async function init(){
    showSkel();
    try{
        const res=await fetch(CSV_URL+'&t='+Date.now());
        if(!res.ok)throw new Error('HTTP '+res.status);
        const text=await res.text();
        const rows=parseCSV(text);
        if(!rows.length)throw new Error('Порожній файл');
        detect(rows);
        if(!stores.length){
            // Show debug info to understand CSV structure
            const dbg=document.createElement('div');
            dbg.style.cssText='background:#1d1d1f;color:#0f0;font-family:monospace;font-size:11px;padding:12px;border-radius:8px;margin:10px;white-space:pre;overflow-x:auto;max-height:400px;overflow-y:auto';
            let txt='CSV рядки 0-5:\n';
            rows.slice(0,6).forEach((r,i)=>txt+=`[${i}]: ${r.slice(0,12).map((c,j)=>`${j}="${c}"`).join(' | ')}\n`);
            txt+='\nsubRow='+subRow+' storeRow='+storeRow;
            dbg.textContent=txt;
            document.getElementById('tabContent').innerHTML='';
            document.getElementById('tabContent').appendChild(dbg);
            throw new Error('Не знайдено магазини — дивись debug вище');
        }
        renderFilters();
        render();
    }catch(e){
        document.getElementById('tabContent').innerHTML=`<div class="table-card"><div class="status-box error">❌ ${e.message}</div></div>`;
        console.error(e);
    }
}
init();
